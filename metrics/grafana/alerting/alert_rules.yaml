apiVersion: 1
groups:
  - orgId: 1
    name: sig-alert-evaluation-group
    folder: sig-alert-rule
    interval: 1m
    rules:
      - uid: de9ayy0ojq8e8d
        title: ram-usage-alert
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: |
                ((node_memory_MemTotal_bytes - node_memory_MemFree_bytes - (node_memory_Cached_bytes + node_memory_Buffers_bytes + node_memory_SReclaimable_bytes)) / node_memory_MemTotal_bytes) * 100
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: KeepLast
        execErrState: Error
        for: 1m
        annotations:
          summary: "sig memory warning: using {{ $values.A.Value }}% of RAM"
        isPaused: false
        notification_settings:
          receiver: slack-sig-alerts

      - uid: ce8wwpcp2dkowb
        title: log-error-alert
        condition: C
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              datasource:
                type: loki
                uid: P8E80F9AEF21F6940
              editorMode: code
              expr: count_over_time({level="error"}[5m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: count
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: jBuN47BVz
        panelId: 26
        # Keep OK, not Alerting. For a {level="error"} query, no data means no errors
        # (healthy), so Alerting would fire on every window without an error. The
        # sig-logs-pipeline-check alert below handles the case where logs stop.
        noDataState: OK
        for: 1m
        execErrState: Error
        annotations:
          __dashboardUid__: jBuN47BVz
          __panelId__: "26"
          summary: "error: [{{ $labels.scope }}]: {{ $labels.message }}"
        labels: {}
        isPaused: false
        notification_settings:
          receiver: slack-sig-alerts

      # Fires when no sig logs arrive in 10m (the sig -> file -> alloy -> Loki pipeline
      # has stopped). The error alert above keeps noDataState: OK, so it can't cover
      # this. `or vector(0)` returns 0 rather than an empty result when there are no
      # logs, so the < 1 threshold fires; noDataState: Alerting is a fallback.
      - uid: sig-logs-pipeline-check
        title: sig-logs-pipeline-check
        condition: C
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              datasource:
                type: loki
                uid: P8E80F9AEF21F6940
              editorMode: code
              expr: sum(count_over_time({source="sig"}[10m])) or vector(0)
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 5m
        annotations:
          summary: "no sig logs in the last 10m; check the sig -> alloy -> Loki pipeline"
        labels: {}
        isPaused: false
        notification_settings:
          receiver: slack-sig-alerts
