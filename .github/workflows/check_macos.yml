name: check_macos

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  build_check_macos:
    runs-on: macos-15
    steps:
      - name: "Disk report: initial"
        run: df -h /

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Build Check
        run: zig build -Denable-tsan=false --summary all -Dno-run -Dno-bin

      - name: "Disk report: after build"
        run: |
          df -h /
          du -sh .zig-cache 2>/dev/null || true

  test_macos:
    runs-on: macos-15
    steps:
      - name: "Disk report: initial"
        run: df -h /

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Build Tests
        run: zig build test -Dno-run -Denable-tsan=false --summary all

      - name: "Disk report: after build tests"
        run: |
          df -h /
          du -sh .zig-cache zig-out 2>/dev/null || true

      - name: Run Tests
        run: |
          set -eo pipefail
          zig-out/bin/test 2>&1 | cat

  test_macos_hashmap_ledger:
    runs-on: macos-15
    steps:
      - name: "Disk report: initial"
        run: df -h /

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Build Tests
        run: zig build test -Dno-run -Denable-tsan=false --summary all -Dlong-tests
          -Dledger=hashmap -Dfilter="ledger"

      - name: "Disk report: after build tests"
        run: |
          df -h /
          du -sh .zig-cache zig-out 2>/dev/null || true

      - name: Run Tests
        run: |
          set -eo pipefail
          zig-out/bin/test 2>&1 | cat

  test_webzockets_macos:
    runs-on: macos-15
    steps:
      - name: "Disk report: initial"
        run: df -h /

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-webzockets-${{ hashFiles('build.zig.zon',
            'src/rpc/webzockets/build.zig', 'src/rpc/webzockets/build.zig.zon')
            }}

      - name: Build and Run Webzockets Tests
        run: |
          cd src/rpc/webzockets
          zig build test --summary all

      - name: "Disk report: after webzockets"
        run: |
          df -h /
          du -sh .zig-cache src/rpc/webzockets/.zig-cache 2>/dev/null || true
