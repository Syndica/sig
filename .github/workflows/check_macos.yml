name: check_macos

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  build_check_macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-${{ hashFiles('build.zig', 'build.zig.zon', 'v1/build.zig', 'v1/build.zig.zon') }}

      - name: Build Check
        run: |
          ./tools/fetch-zig-deps.py v1/build.zig.zon
          cd v1
          zig build --summary all -Dno-run -Dno-bin

  test_macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-${{ hashFiles('build.zig', 'build.zig.zon', 'v1/build.zig', 'v1/build.zig.zon') }}

      - name: Build Tests
        run: |
          ./tools/fetch-zig-deps.py v1/build.zig.zon
          cd v1
          zig build test -Dno-run -Denable-tsan=false --summary all

      - name: Run Tests
        run: |
          set -eo pipefail
          cd v1
          zig-out/bin/test 2>&1 | cat

  test_macos_hashmap_ledger:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-${{ hashFiles('build.zig', 'build.zig.zon', 'v1/build.zig', 'v1/build.zig.zon') }}

      - name: Build Tests
        run: |
          ./tools/fetch-zig-deps.py v1/build.zig.zon
          cd v1
          zig build test -Dno-run -Denable-tsan=false --summary all -Dlong-tests -Dledger=hashmap -Dfilter="ledger"

      - name: Run Tests
        run: |
          set -eo pipefail
          cd v1
          zig-out/bin/test 2>&1 | cat

  test_webzockets_macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: macos-webzockets-${{ hashFiles('build.zig.zon',
            'v1/src/rpc/webzockets/build.zig', 'v1/src/rpc/webzockets/build.zig.zon')
            }}

      - name: Build and Run Webzockets Tests
        run: |
          ./tools/fetch-zig-deps.py v1/src/rpc/webzockets/build.zig.zon
          cd v1/src/rpc/webzockets
          zig build test --summary all
