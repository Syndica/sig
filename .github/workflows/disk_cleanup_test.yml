name: disk_cleanup_test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup_report:
    runs-on: ubuntu-latest
    steps:
      - name: "Report: Initial disk space"
        run: |
          echo "=== Initial Disk Usage ==="
          df -h /
          echo ""
          echo "=== Large directories in /usr/local ==="
          sudo du -sh /usr/local/* 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== Large directories in /opt ==="
          sudo du -sh /opt/* 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== /usr/share top consumers ==="
          sudo du -sh /usr/share/* 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== Docker images ==="
          docker image ls
          echo ""
          echo "=== Swap ==="
          free -h
          echo ""
          echo "=== /imagegeneration (agent tools) ==="
          sudo du -sh /imagegeneration 2>/dev/null || true
          echo ""
          echo "=== Snap packages ==="
          sudo du -sh /snap/* 2>/dev/null | sort -rh | head -10
          echo ""
          echo "=== /home/runner disk ==="
          sudo du -sh /home/runner/* 2>/dev/null | sort -rh | head -10

      - name: "Cleanup: Remove unnecessary tools and packages"
        run: |
          echo "=== Removing Android SDK ==="
          sudo rm -rf /usr/local/lib/android
          echo "=== Removing .NET ==="
          sudo rm -rf /usr/share/dotnet
          echo "=== Removing Haskell/GHC ==="
          sudo rm -rf /opt/ghc /usr/local/.ghcup
          echo "=== Removing CodeQL ==="
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          echo "=== Removing Swift ==="
          sudo rm -rf /usr/share/swift
          echo "=== Removing Google Cloud SDK ==="
          sudo rm -rf /usr/lib/google-cloud-sdk
          echo "=== Removing Azure CLI ==="
          sudo rm -rf /opt/az /usr/lib/az
          echo "=== Removing PowerShell ==="
          sudo rm -rf /usr/local/share/powershell
          echo "=== Removing Docker images ==="
          docker image prune -af
          echo "=== Removing unused apt packages ==="
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli \
            google-chrome-stable firefox powershell mono-devel \
            libgl1-mesa-dri google-cloud-cli 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          echo "=== Removing /opt/hostedtoolcache ==="
          sudo rm -rf /opt/hostedtoolcache
          echo "=== Removing snap packages ==="
          sudo rm -rf /snap /var/snap /var/lib/snapd

      - name: "Report: Final disk space"
        run: |
          echo "=== Final Disk Usage ==="
          df -h /
          echo ""
          echo "=== Space recovered ==="
          echo "(Compare 'Avail' column above with initial report)"
