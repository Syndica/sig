name: check_linux

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  test_kcov_linux:
    runs-on: ubuntu-latest
    steps:
      - name: "Disk report: initial"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: kcov-${{ hashFiles('build.zig', 'build.zig.zon', 'v2/build.zig', 'v2/build.zig.zon', 'shared/build.zig', 'shared/build.zig.zon') }}

      - name: "Disk report: after zig setup"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - name: Pre-download zig dependencies
        run: |
          ./scripts/fetch-zig-deps.py
          ./scripts/fetch-zig-deps.py v2/build.zig.zon
          zig build test -Dno-run -Dlong-tests -Dtarget=x86_64-linux-gnu.2.36 -Denable-tsan=false -Dno-network-tests -Dallow-no-sha -Dallow-no-avx512 --summary all

      - name: "Disk report: after build"
        run: |
          df -h /
          du -sh .zig-cache zig-out 2>/dev/null || true

      - name: Set up kcov
        run: |
          curl -L https://github.com/Syndica/kcov/releases/download/v43-bin/kcov-v43-bin-linux-x86_64.tar.gz | tar xz
          echo "$PWD/kcov-v43-bin-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Build
        run: zig build test -Dno-run -Dlong-tests -Dtarget=x86_64-linux-gnu.2.36
          -Denable-tsan=false -Dno-network-tests -Dallow-no-sha -Dallow-no-avx512 --summary all

      - name: Collect v1 coverage
        run: bash scripts/kcov_ci.sh

      - name: Collect v2 coverage
        run: |
          cd v2
          zig build test -Dkcov --summary all

      - name: Debug coverage reports
        run: |
          echo "=== v1 report ==="
          head -15 kcov-merged/kcov-merged/cobertura.xml
          echo ""
          echo "--- v1 filename samples ---"
          grep 'filename=' kcov-merged/kcov-merged/cobertura.xml | head -3
          echo ""
          echo "=== v2 report ==="
          head -15 v2/zig-out/kcov/kcov-merged/cobertura.xml
          echo ""
          echo "--- v2 filename samples ---"
          grep 'filename=' v2/zig-out/kcov/kcov-merged/cobertura.xml | head -3

      - name: "Disk report: after test and collect"
        run: |
          df -h /
          du -sh kcov-merged 2>/dev/null || true

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "=== Codecov SHA debug ==="
          echo "GITHUB_EVENT_NAME: ${GITHUB_EVENT_NAME}"
          echo "GITHUB_SHA:        $GITHUB_SHA"
          echo "GITHUB_REF:        ${GITHUB_REF_NAME:-unset}"
          echo "HEAD:              $(git rev-parse HEAD)"
          echo "HEAD^1:            $(git rev-parse HEAD^1 2>/dev/null || echo 'N/A')"
          echo "HEAD^2:            $(git rev-parse HEAD^2 2>/dev/null || echo 'N/A (not a merge commit)')"
          UPLOAD_SHA="$GITHUB_SHA"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            UPLOAD_SHA="$PR_HEAD_SHA"
            echo "Pull request event detected"
          elif git rev-parse HEAD^2 >/dev/null 2>&1; then
            echo "Merge commit detected"
          else
            echo "Not a merge commit"
          fi
          echo "Uploading coverage for $UPLOAD_SHA"
          echo "========================="

          curl -fsSLo codecov https://cli.codecov.io/v11.2.6/linux/codecov
          chmod +x codecov
          ./codecov --verbose upload-coverage \
            --fail-on-error \
            --dir kcov-merged/kcov-merged \
            --dir v2/zig-out/kcov/kcov-merged \
            --commit-sha "$UPLOAD_SHA"

  gossip_and_fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: "Disk report: initial"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-release-${{ hashFiles('build.zig', 'build.zig.zon', 'shared/build.zig', 'shared/build.zig.zon') }}

      - name: "Disk report: after zig setup"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - name: Build
        run: |
          ./scripts/fetch-zig-deps.py
          zig build sig fuzz -Dno-run -Denable-tsan=false -Doptimize=ReleaseSafe -Dallow-no-sha -Dallow-no-avx512 -p workspace/zig-out-release --summary all

      - name: "Disk report: after build"
        run: |
          df -h /
          du -sh .zig-cache workspace/zig-out-release 2>/dev/null || true

      - name: Run Gossip
        run: bash scripts/gossip_test.sh 120 workspace/zig-out-release/bin/sig

      - name: Run Gossip Service Fuzzer
        run: workspace/zig-out-release/bin/fuzz --seed 19 gossip-service 10000

      - name: Run Gossip Table Fuzzer
        run: workspace/zig-out-release/bin/fuzz --seed 19 gossip-table 100000

      - name: Run Allocators Fuzzer
        run: workspace/zig-out-release/bin/fuzz --seed 19 allocators 10000

      - name: Run Ledger Fuzzer
        run: workspace/zig-out-release/bin/fuzz --seed 19 ledger 10000

  build_and_test_linux:
    runs-on: ubuntu-latest
    steps:
      - name: "Disk report: initial"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-${{ hashFiles('build.zig', 'build.zig.zon', 'shared/build.zig', 'shared/build.zig.zon') }}

      - name: "Disk report: after zig setup"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - name: Build
        run: |
          ./scripts/fetch-zig-deps.py
          zig build -Denable-tsan=true -Dallow-no-sha -Dallow-no-avx512 -p workspace/zig-out --summary all

      - name: "Disk report: after build"
        run: |
          df -h /
          du -sh .zig-cache workspace/zig-out 2>/dev/null || true

      - name: Build Tests
        run:
          zig build test -Dno-run -Dlong-tests -Denable-tsan=true -Dno-network-tests
          -Dallow-no-sha -Dallow-no-avx512 --summary all

      - name: "Disk report: after build tests"
        run: |
          df -h /
          du -sh .zig-cache zig-out 2>/dev/null || true

      - name: Run Tests
        run: |
          set -eo pipefail
          zig-out/bin/test 2>&1 | cat

  linux_misc_checks:
    runs-on: ubuntu-latest
    steps:
      - name: "Disk report: initial"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-${{ hashFiles('build.zig', 'build.zig.zon', 'v2/build.zig', 'v2/build.zig.zon', 'shared/build.zig', 'shared/build.zig.zon') }}

      - name: Install Python PIP
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get -yq update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get -yq install python3 python3-pip

      - name: Lint (Zig)
        run: |
          zig fmt --check src/ shared/ build.zig
          cd conformance/
          zig fmt --check src/ build.zig

      - name: Check style
        run: |
          python3 scripts/style.py --check src
          python3 scripts/style.py --check shared
          python3 scripts/style.py --check conformance/src

      - name: Check docs
        run: python3 docs/check.py ./

      - name: Shared tests
        run: |
          ./scripts/fetch-zig-deps.py shared/build.zig.zon
          cd shared
          zig build test -Dallow-no-sha -Dallow-no-avx512 --summary all

      - name: V2 checks
        run: |
          ./scripts/fetch-zig-deps.py v2/build.zig.zon
          cd v2/
          zig build ci -Dallow-no-sha -Dallow-no-avx512 --summary all

      - name: "Disk report: after v2 checks"
        run: |
          df -h /
          du -sh .zig-cache v2/.zig-cache 2>/dev/null || true

      - name: Build and test hashmap ledger (linux)
        run: |
          set -eo pipefail
          ./scripts/fetch-zig-deps.py
          zig build test -Dno-run -Dlong-tests -Denable-tsan=true -Dledger=hashmap -Dfilter="ledger" -Dallow-no-sha -Dallow-no-avx512 --summary all
          zig-out/bin/test 2>&1 | cat

      - name: Webzockets tests (linux)
        run: |
          ./scripts/fetch-zig-deps.py src/rpc/webzockets/build.zig.zon
          cd src/rpc/webzockets
          zig build test --summary all

  solana_conformance:
    runs-on: ubuntu-latest
    steps:
      - name: "Disk report: initial"
        run: |
          echo "=== df -h / ==="
          df -h /
          echo ""
          echo "=== Top space consumers ==="
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache \
            /usr/lib/google-cloud-sdk /opt/ghc /usr/share/swift 2>/dev/null | sort -rh
          echo ""
          echo "=== Docker images ==="
          docker image ls --format '{{.Repository}}:{{.Tag}} {{.Size}}'

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key:
            build_conformance-v1-${{ hashFiles('build.zig', 'build.zig.zon',
            'conformance/build.zig', 'conformance/build.zig.zon') }}

      - name: "Disk report: after checkout + zig setup"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - name: Build Conformance
        run: |
          ./scripts/fetch-zig-deps.py conformance/build.zig.zon
          cd conformance
          zig build -Dallow-no-sha -Dallow-no-avx512 -Ddisable-feature-status-logs --summary all

      - name: "Disk report: after build"
        run: |
          df -h /
          echo "=== Zig cache size ==="
          du -sh ~/.cache/zig 2>/dev/null || true
          du -sh conformance/zig-out 2>/dev/null || true
          du -sh conformance/.zig-cache 2>/dev/null || true
          du -sh .zig-cache 2>/dev/null || true
          du -sh zig-out 2>/dev/null || true

      - id: test_vectors_cache
        uses: actions/cache@v4
        with:
          key: test-vectors-${{ hashFiles('conformance/commits.env') }}
          path: conformance/env/test-vectors

      - name: Clone Fixtures
        if: steps.test_vectors_cache.outputs.cache-hit != 'true'
        run: |
          cd conformance
          . commits.env
          mkdir -p env
          cd env
          git clone https://github.com/firedancer-io/test-vectors.git
          cd test-vectors
          git checkout $TEST_VECTORS_COMMIT

      - name: "Disk report: after fixtures"
        run: |
          df -h /
          echo "=== test-vectors size ==="
          du -sh conformance/env/test-vectors 2>/dev/null || true

      - name: Run Fixtures
        run: conformance/scripts/ci-run.sh

  feature_compat_conformance:
    runs-on: ubuntu-latest
    steps:
      - name: "Disk report: initial"
        run: |
          df -h /
          sudo du -sh /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache /usr/lib/google-cloud-sdk /opt/ghc 2>/dev/null | sort -rh

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key:
            feature_compat-v1-${{ hashFiles('build.zig', 'build.zig.zon',
            'conformance/build.zig', 'conformance/build.zig.zon') }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM/Clang for Rust bindgen
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang libclang-dev llvm-dev

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          key: feature-compat-cargo-${{ runner.os }}-${{ hashFiles('conformance/commits.env') }}
          restore-keys: |
            feature-compat-cargo-${{ runner.os }}-
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            conformance/env/solfuzz-agave/target

      - name: Build Sig target and Agave target
        run: |
          ./scripts/fetch-zig-deps.py conformance/build.zig.zon
          cd conformance
          zig build solfuzz_sig -Dallow-no-sha -Dallow-no-avx512 --summary all
          . commits.env

          mkdir -p env
          rm -rf env/solfuzz-agave
          git clone https://github.com/firedancer-io/solfuzz-agave.git env/solfuzz-agave
          cd env/solfuzz-agave
          git checkout "$SOLFUZZ_AGAVE_COMMIT"
          cargo build --lib --release

      - name: "Disk report: after build"
        run: |
          df -h /
          du -sh conformance/.zig-cache conformance/zig-out 2>/dev/null || true
          du -sh conformance/env/solfuzz-agave/target 2>/dev/null || true
          du -sh ~/.cargo 2>/dev/null || true

      - name: Check feature compatibility
        run: |
          cd conformance
          python3 scripts/check_feature_compat.py \
            zig-out/lib/libsolfuzz_sig.so \
            env/solfuzz-agave/target/release/libsolfuzz_agave.so
