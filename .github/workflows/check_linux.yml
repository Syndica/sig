name: check_linux

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  test_kcov_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Run test_kcov_linux
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check_linux.sh test_kcov_linux

  gossip_and_fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-release-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Run gossip_and_fuzz
        run: ./scripts/check_linux.sh gossip_and_fuzz

  build_and_test_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Run build_and_test_linux
        run: ./scripts/check_linux.sh build_and_test_linux

  linux_misc_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: selfhosted-${{ hashFiles('build.zig', 'build.zig.zon') }}

      - name: Run linux_misc_checks
        run: ./scripts/check_linux.sh linux_misc_checks

  solana_conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: build_conformance-v1-${{ hashFiles('build.zig', 'build.zig.zon',
            'conformance/build.zig', 'conformance/build.zig.zon') }}

      - uses: actions/cache@v4
        with:
          key: test-vectors-${{ hashFiles('conformance/commits.env') }}
          path: conformance/env/test-vectors

      - name: Run solana_conformance
        run: ./scripts/check_linux.sh solana_conformance
