global:
  scrape_interval: 2s
  evaluation_interval: 15s
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      scheme: http
      timeout: 10s
      api_version: v2
scrape_configs:
  - job_name: prometheus
    # Ingest native histograms (e.g. sig's latency metrics). Prometheus then negotiates the
    # protobuf exposition (PrometheusProto) with the target, which the sig telemetry service serves.
    scrape_native_histograms: true
    static_configs:
      - targets:
          - host.docker.internal:9110 # sig prometheus general
          - node-exporter:9100 # node exporter
